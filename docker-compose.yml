services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: onechemic-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: one_chemic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d one_chemic"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - onechemic-network

  # Backend API (.NET)
  backend:
    build:
      context: ./Onechemic
      dockerfile: Onechemic.API/Dockerfile
    container_name: onechemic-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=one_chemic;Username=postgres;Password=admin
      - Jwt__Key=RUHQ6zJJDLWlWgdA6ReAezpYxDvfNsyv
      - Jwt__Issuer=oncemeic
      - Jwt__Audience=oncechemic
      - Jwt__ExpiresInMinutes=60
    ports:
      - "127.0.0.1:5017:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/wwwroot/products
      - backend_categories:/app/wwwroot/categories
    networks:
      - onechemic-network

  # Admin Frontend (Next.js)
  admin:
    build:
      context: ./Frontend/admin
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://nassar-onechemic-api.o1force.com
    container_name: onechemic-admin
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://nassar-onechemic-api.o1force.com
    ports:
      - "127.0.0.1:5018:3000"
    depends_on:
      - backend
    networks:
      - onechemic-network

  # OneChemic Frontend (Next.js)
  onechemic:
    build:
      context: ./Frontend/onechemic
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://nassar-onechemic-api.o1force.com
    container_name: onechemic-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://nassar-onechemic-api.o1force.com
    ports:
      - "127.0.0.1:5016:3001"
    depends_on:
      - backend
    networks:
      - onechemic-network

volumes:
  postgres_data:
  backend_uploads:
  backend_categories:

networks:
  onechemic-network:
    driver: bridge
